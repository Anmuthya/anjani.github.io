# Personal Blog Configuration
title: "Anjani Kumar Muthyala"
subtitle: "DevOps Engineer & AI Enthusiast"
description: "Anjani Kumar Muthyala — Senior DevOps Engineer at Verizon. Blog about DevOps, AWS, Kubernetes, Terraform, AI automation, and cloud infrastructure."
author: "Anjani Kumar Muthyala"
email: "muthyala.anjani@gmail.com"
url: "https://anjani-muthyala.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
theme: jekyll-theme-architect
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Social media links
social:
  github: anjani-muthyala
  twitter: anjanikumar_m
  linkedin: anjani-kumar-muthyala

# SEO settings — jekyll-seo-tag uses these
google_analytics:
twitter:
  username: anjanikumar_m
  card: summary_large_image
author:
  name: Anjani Kumar Muthyala
  twitter: anjanikumar_m
  picture: /assets/images/profile.jpeg

# Open Graph / Social sharing default image
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Anjani Kumar Muthyala"
      image: /assets/images/profile.jpeg
  - scope:
      path: ""
    values:
      layout: "default"
      image: /assets/images/profile.jpeg

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - COLOR_PALETTE.md
  - IMPLEMENTATION_SUMMARY.md
  - THEME_GUIDE.md

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Sass settings
sass:
  sass_dir: _sass
  style: compressed

# Timezone
timezone: America/New_York
